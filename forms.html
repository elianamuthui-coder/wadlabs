<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forms 101</title>
</head>

<body>
    <section id="simple-form">
        <h2>Simple Form</h2>
        <!--the form elements-->
        <form method="post" 
        action="process.php" 
        enctype="multipart/form-data"
         id="simple-form"
          name="simple-form"
            class="forms">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password">
            </div>

            <div class="form-group">
                <input type="submit" name="login" value="Login">
                <input type="reset" name="reset" value="Clear">
            </div>
        </form>
    </section>
    <section id="chicken-recipe-form">
        <h2>Chicken Recipe Form</h2>
        <form method="post" action="process2.php" >
            <div class ="form-group">
                <label for="recipe-title">
                    Recipe Title
                </label>
                <input id="recipe-title" type ="text" name="recipe-title"
                required>

            </div>
            <div class ="form-group">
                <label for="Dry ingredients">
                    Dry Ingredients
                </label>
                <input id="salt" type ="checkbox" name="dry-ingredients" value="Salt"
                required> Salt
                <input id="thyme" type="checkbox" name="dry-ingredients" value="thyme" required> thyme
                <input id="cayenne" type="checkbox" name="dry-ingredients" value="Cayenne" required> Cayenne

            </div>
            <div class="form-group">
                <label for="grilled">Grilled </label>
                <input  name="grilled" id="grilled-no" value="0" type="radio">No
                <input  name="grilled"  id="grilled-yes" value="1" type="radio" required>Yes
            </div>
                <div class="form-group">
                    <label for="steps">Steps</label>
                    <textarea name="steps" id="steps" ></textarea>
                    <form>
                        <input type="submit" name="submit" type="submit">
                        <input type="reset" name="reset" value="reset">
                    </form>
                </div>
        
        </form>
            <div class="form-group
    </section>
</body>

</html>
