<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>HTML Tables 101</title>

        
    </head>
    <body>
        <section id=""simple -table>
            <h2>Simple Table</h2>
            <table border="1">
                <!-- table heading region-->
                <thead>
                    <!-- a row-->
                    <tr>
                        <th>Adm. No</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1234</td>
                        <td>James</td>
                    </tr>
                    <tr>
                        <td>4321</td>
                        <td>Opiyo</td>
                    </tr>
                </tbody>
                
            </table>

        </section>
        <section id="course table">
            <h2>Course Table</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th colspan="2">Course </th>
                        
                    </tr>
                    <tr>
                        <th></th>
                        <th>BBIT1</th>
                        <th>BBIT2</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Prog</td>
                        <td>OOP</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>DB</td>
                        <td>WAD</td>
                        
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Ethics</td>
                        <td>PA</td>
                    </tr>
                </tbody>

            </table>

        </section>
    </body>
</html>
